name: Make Package Public
on:
  workflow_dispatch:
permissions:
  packages: write
jobs:
  make-public:
    runs-on: ubuntu-latest
    steps:
      - name: Make multica-backend package public
        run: |
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/JockiBox/packages/container/multica-backend \
            -d '{"visibility":"public"}'
