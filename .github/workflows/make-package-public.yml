name: Make Package Public
on:
  workflow_dispatch:
permissions:
  packages: write
jobs:
  make-public:
    runs-on: ubuntu-latest
    steps:
      - name: Make multica-backend package public (org-level)
        run: |
          # Try org-level with lowercase
          echo "=== Trying org-level (lowercase) ==="
          curl -L \
            -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer *** secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/orgs/jockibox/packages/container/multica-backend \
            -d '{"visibility":"public"}'
          echo ""
          echo "=== Listing org packages ==="
          curl -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer *** secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/JockiBox/packages?package_type=container"
